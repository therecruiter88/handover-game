<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Handover Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="mobile-message" class="hidden">
        <p>Mobile device not supported!</p>
    </div>
    
    <div id="token" class="token-container">
        <label for="token-input">Enter Secret:</label>
        <input type="password" id="token-input" class="token-input">
        <button id="submit-token" class="token-button">Start Game</button>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
